<!DOCTYPE html>
<html>
<head>
    <title>Student Registration Form</title>
</head>

<body style="
    margin: 0;
    padding: 0;
    background-color: lightgray;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: Arial;
">

    <div style="
        background-color: white;
        padding: 30px;
        border-radius: 10px;
        width: 350px;
        box-shadow: 0px 0px 10px gray;
    ">

        <h2 style="
            text-align: center;
            color: blue;
            margin-bottom: 20px;
        ">
            Student Registration Form
        </h2>

        <input type="text" placeholder="Student Name" style="
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid gray;
            border-radius: 5px;
            font-size: 14px;
            box-sizing: border-box;
        ">

        <input type="email" placeholder="Email" style="
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid gray;
            border-radius: 5px;
            font-size: 14px;
            box-sizing: border-box;
        ">

        <input type="password" placeholder="Password" style="
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid gray;
            border-radius: 5px;
            font-size: 14px;
            box-sizing: border-box;
        ">

        <input type="text" placeholder="Course" style="
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid gray;
            border-radius: 5px;
            font-size: 14px;
            box-sizing: border-box;
        ">

        <input type="tel" placeholder="Mobile Number" style="
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid gray;
            border-radius: 5px;
            font-size: 14px;
            box-sizing: border-box;
        ">

        <button style="
            width: 100%;
            padding: 12px;
            background-color: blue;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        ">
            Register
        </button>

    </div>

</body>
</html>
